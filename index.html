<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Ad Video Wall</title>
<script src="https://customer-nguqf0yqc9xf45px.cloudflarestream.com/31af203bfbc05752aa489e5c47f86623/iframe"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 1200px;
  }
  .cell {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    box-shadow: 0 6px 28px rgba(0, 0, 0, 0.25);
    aspect-ratio: 1 / 1;
  }
  .cell stream-video,
  .cell iframe {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border: none;
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
  const videoIds = [
    '3bbca4707883569cfd528bf0df97e1f0',
    '2c1c0fb6d69cc42cae9d01181e90aec8'
  ];

  const offsets = [
    3, 17, 8, 22,
    12, 1, 25, 6,
    19, 10, 4, 15,
    24, 7, 20, 2
  ];

  const grid = document.getElementById('grid');
  const base = 'https://customer-nguqf0yqc9xf45px.cloudflarestream.com';

  for (let i = 0; i < 16; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';

    const iframe = document.createElement('iframe');
    const vid = videoIds[i % 2];
    const t = offsets[i];
    iframe.src = `${base}/${vid}/iframe?muted=true&autoplay=true&loop=true&controls=false&startTime=${t}`;
    iframe.allow = 'autoplay; fullscreen';
    iframe.loading = 'lazy';

    cell.appendChild(iframe);
    grid.appendChild(cell);
  }
</script>
</body>
</html>
